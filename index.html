<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;
const XLSX_LIB = window.XLSX;


// ── Constants ──
const ENTRY_BAR_OPTIONS = ["開場", "1", "2", "3", "4", "4+"];
const PERCENT_OPTIONS = [
  { label: "0.088%", value: 0.088 },
  { label: "0.167%", value: 0.167 },
  { label: "0.200%", value: 0.200 },
  { label: "1.000%", value: 1.000 },
];
const CAPITAL_OPTIONS = [
  { label: "1", value: 1 },
  { label: "2", value: 2 },
];
const YEARS  = Array.from({ length: 21 }, (_, i) => 2006 + i);
const MONTHS = Array.from({ length: 12 }, (_, i) => i + 1);
const DAYS   = Array.from({ length: 31 }, (_, i) => i + 1);

const SC = "w-full bg-zinc-800 border border-zinc-700 rounded-xl px-2 py-2 text-amber-400 text-sm font-mono font-bold text-center focus:outline-none focus:border-amber-500/70";

// ── Data helpers ──
const emptyRow = () => ({
  id: Date.now() + Math.random(),
  direction: "L",
  grids: "",
  capital: 1,
  entryBar: "",
});

// calcPnL: grids * pctRate * capital
const calcPnL = (grids, pctRate, capital = 1) => {
  const g = parseFloat(grids);
  const p = parseFloat(pctRate);
  const c = parseFloat(capital) || 1;
  if (!grids || isNaN(g) || isNaN(p)) return null;
  return g * p * c;
};

const emptySession = () => ({
  year:     new Date().getFullYear(),
  month:    new Date().getMonth() + 1,
  day:      new Date().getDate(),
  strategy: 1,          // 1 or 2
  pctRate:  0.167,
  rows:     Array.from({ length: 4 }, emptyRow),
});

const STORAGE_KEY = "backtest_trades_v5";

async function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
async function saveAll(records) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  } catch (e) { console.error(e); }
}

// dateKey helper
const dk = rec => `${rec.year}/${String(rec.month).padStart(2,"0")}/${String(rec.day).padStart(2,"0")}`;

// Monthly compound for a given strategy's records
function calcMonthlyCompound(records, year, month, strategy) {
  const days = records
    .filter(r => r.year === year && r.month === month && r.strategy === strategy)
    .sort((a, b) => a.day - b.day);
  if (!days.length) return null;
  let compound = 1;
  const steps = days.map(rec => {
    const dayPnl = rec.rows.reduce((acc, r) => acc + (calcPnL(r.grids, rec.pctRate, r.capital) || 0), 0);
    compound *= (1 + dayPnl / 100);
    return { day: rec.day, dayPnl, compound: (compound - 1) * 100 };
  });
  return { steps, totalCompound: (compound - 1) * 100 };
}

// ── Excel Export ──
function exportToExcel(records) {
  const wb   = XLSX_LIB.utils.book_new();
  const pFmt = "0.000%";

  const sorted = [...records].sort((a, b) => dk(a).localeCompare(dk(b)));

  // Separate by strategy
  const s1 = sorted.filter(r => r.strategy === 1);
  const s2 = sorted.filter(r => r.strategy === 2);

  // Build dayMap per strategy
  function buildDayMap(recs) {
    const m = {};
    recs.forEach(rec => {
      const key = dk(rec);
      if (!m[key]) m[key] = { year: rec.year, month: rec.month, day: rec.day, pctRate: rec.pctRate, trades: [] };
      rec.rows.forEach(r => {
        if (!r.grids) return;
        const pnl = calcPnL(r.grids, rec.pctRate, r.capital);
        if (pnl !== null) m[key].trades.push({ pnl, direction: r.direction });
      });
    });
    return m;
  }
  const dayMap1 = buildDayMap(s1);
  const dayMap2 = buildDayMap(s2);

  // Build compound maps per strategy
  function buildCompoundMap(recs, strategy) {
    const monthSet = [...new Set(recs.map(r => `${r.year}-${String(r.month).padStart(2,"0")}`))].sort();
    const cm = {};
    monthSet.forEach(ym => {
      const [y, m] = ym.split("-").map(Number);
      const res = calcMonthlyCompound(recs, y, m, strategy);
      if (!res) return;
      res.steps.forEach(s => {
        cm[`${y}/${String(m).padStart(2,"0")}/${String(s.day).padStart(2,"0")}`] = { dayPnl: s.dayPnl, compound: s.compound };
      });
    });
    return cm;
  }
  const cm1 = buildCompoundMap(s1, 1);
  const cm2 = buildCompoundMap(s2, 2);

  // ── Detail sheet builder ──
  function buildDetailRows(recs, dayMap, compoundMap) {
    const rows = [];
    recs.forEach(rec => {
      const key  = dk(rec);
      const dayTotal = (dayMap[key]?.trades || []).reduce((a, t) => a + t.pnl, 0);
      const compound = compoundMap[key]?.compound ?? "";
      const valid = rec.rows.filter(r => r.grids !== "");
      valid.forEach((r, i) => {
        const pnl = calcPnL(r.grids, rec.pctRate, r.capital);
        rows.push([
          key, rec.year, rec.month, rec.day,
          rec.pctRate / 100,
          i + 1,
          r.direction,
          parseFloat(r.grids),
          r.capital,
          pnl !== null ? pnl / 100 : "",
          r.entryBar || "",
          i === 0 ? dayTotal / 100 : "",
          i === 0 && compound !== "" ? compound / 100 : "",
        ]);
      });
    });
    return rows;
  }

  const detailHeaders = ["日期","年","月","日","每格%","交易序號","方向","格數","資金倍數","損益%","進場K棒","當日總損益%","當月累積複利%"];

  // Sheet 1: 策略一逐筆
  const d1 = buildDetailRows(s1, dayMap1, cm1);
  const ws1 = XLSX_LIB.utils.aoa_to_sheet([detailHeaders, ...d1]);
  ws1["!cols"] = [{wch:12},{wch:6},{wch:6},{wch:6},{wch:10},{wch:10},{wch:6},{wch:8},{wch:10},{wch:10},{wch:10},{wch:14},{wch:14}];
  for (let r = 1; r <= d1.length; r++) {
    [4,9,11,12].forEach(c => { const cell = XLSX_LIB.utils.encode_cell({r,c}); if (ws1[cell] && typeof ws1[cell].v==="number") ws1[cell].z = pFmt; });
  }
  XLSX_LIB.utils.book_append_sheet(wb, ws1, "策略一_逐筆明細");

  // Sheet 2: 策略二逐筆
  const d2 = buildDetailRows(s2, dayMap2, cm2);
  const ws2 = XLSX_LIB.utils.aoa_to_sheet([detailHeaders, ...d2]);
  ws2["!cols"] = ws1["!cols"];
  for (let r = 1; r <= d2.length; r++) {
    [4,9,11,12].forEach(c => { const cell = XLSX_LIB.utils.encode_cell({r,c}); if (ws2[cell] && typeof ws2[cell].v==="number") ws2[cell].z = pFmt; });
  }
  XLSX_LIB.utils.book_append_sheet(wb, ws2, "策略二_逐筆明細");

  // ── Summary sheet builder ──
  function buildSummaryRows(dayMap, compoundMap) {
    return Object.entries(dayMap).sort().map(([date, d]) => {
      const total = d.trades.reduce((a,t) => a+t.pnl, 0);
      const wins  = d.trades.filter(t => t.pnl > 0).length;
      const comp  = compoundMap[date]?.compound ?? "";
      return [
        date, d.year, d.month, d.day, d.pctRate/100, d.trades.length,
        d.trades.filter(t=>t.direction==="L").length,
        d.trades.filter(t=>t.direction==="S").length,
        total/100, wins, d.trades.filter(t=>t.pnl<=0).length,
        d.trades.length>0 ? wins/d.trades.length : 0,
        comp !== "" ? comp/100 : "",
      ];
    });
  }
  const summaryHeaders = ["日期","年","月","日","每格%","交易筆數","多單(L)","空單(S)","當日總損益%","勝筆數","負筆數","勝率","當月累積複利%"];
  const summCols = [{wch:12},{wch:6},{wch:6},{wch:6},{wch:10},{wch:10},{wch:8},{wch:8},{wch:12},{wch:8},{wch:8},{wch:8},{wch:14}];

  const sr1 = buildSummaryRows(dayMap1, cm1);
  const ws3 = XLSX_LIB.utils.aoa_to_sheet([summaryHeaders, ...sr1]);
  ws3["!cols"] = summCols;
  for (let r=1;r<=sr1.length;r++) { [[4,pFmt],[8,pFmt],[11,"0.0%"],[12,pFmt]].forEach(([c,f])=>{ const cell=XLSX_LIB.utils.encode_cell({r,c}); if(ws3[cell]&&typeof ws3[cell].v==="number") ws3[cell].z=f; }); }
  XLSX_LIB.utils.book_append_sheet(wb, ws3, "策略一_每日匯總");

  const sr2 = buildSummaryRows(dayMap2, cm2);
  const ws4 = XLSX_LIB.utils.aoa_to_sheet([summaryHeaders, ...sr2]);
  ws4["!cols"] = summCols;
  for (let r=1;r<=sr2.length;r++) { [[4,pFmt],[8,pFmt],[11,"0.0%"],[12,pFmt]].forEach(([c,f])=>{ const cell=XLSX_LIB.utils.encode_cell({r,c}); if(ws4[cell]&&typeof ws4[cell].v==="number") ws4[cell].z=f; }); }
  XLSX_LIB.utils.book_append_sheet(wb, ws4, "策略二_每日匯總");

  // ── Sheet 5: 策略差異（逐日）──
  const allDates = [...new Set([...Object.keys(dayMap1), ...Object.keys(dayMap2)])].sort();
  const diffHeaders = ["日期","策略一當日損益%","策略二當日損益%","差異(二-一)%","策略一累積複利%","策略二累積複利%","複利差異(二-一)%"];
  const diffRows = allDates.map(date => {
    const p1 = (dayMap1[date]?.trades || []).reduce((a,t)=>a+t.pnl,0);
    const p2 = (dayMap2[date]?.trades || []).reduce((a,t)=>a+t.pnl,0);
    const c1 = cm1[date]?.compound ?? "";
    const c2 = cm2[date]?.compound ?? "";
    const hasBoth = dayMap1[date] && dayMap2[date];
    const compDiff = c1 !== "" && c2 !== "" ? (c2-c1)/100 : "";
    return [
      date,
      dayMap1[date] ? p1/100 : "",
      dayMap2[date] ? p2/100 : "",
      hasBoth ? (p2-p1)/100 : "",
      c1 !== "" ? c1/100 : "",
      c2 !== "" ? c2/100 : "",
      compDiff,
    ];
  });
  const ws5 = XLSX_LIB.utils.aoa_to_sheet([diffHeaders, ...diffRows]);
  ws5["!cols"] = [{wch:12},{wch:16},{wch:16},{wch:14},{wch:16},{wch:16},{wch:16}];
  for (let r=1;r<=diffRows.length;r++) {
    [1,2,3,4,5,6].forEach(c => { const cell=XLSX_LIB.utils.encode_cell({r,c}); if(ws5[cell]&&typeof ws5[cell].v==="number") ws5[cell].z=pFmt; });
  }
  XLSX_LIB.utils.book_append_sheet(wb, ws5, "策略差異_每日");

  // ── Sheet 6: 月複利匯總（含差異）──
  const allMonths = [...new Set(sorted.map(r=>`${r.year}-${String(r.month).padStart(2,"0")}`))].sort();
  const monthHeaders = ["年月","策略一月複利%","策略二月複利%","差異(二-一)%","策略一交易天數","策略二交易天數"];
  const monthRows = allMonths.map(ym => {
    const [y,m] = ym.split("-").map(Number);
    const r1 = calcMonthlyCompound(s1,y,m,1);
    const r2 = calcMonthlyCompound(s2,y,m,2);
    const label = `${y}/${String(m).padStart(2,"0")}`;
    const tc1 = r1 ? r1.totalCompound/100 : "";
    const tc2 = r2 ? r2.totalCompound/100 : "";
    const diff = r1&&r2 ? (r2.totalCompound-r1.totalCompound)/100 : "";
    const days1 = s1.filter(r=>r.year===y&&r.month===m).length;
    const days2 = s2.filter(r=>r.year===y&&r.month===m).length;
    return [label, tc1, tc2, diff, days1||"", days2||""];
  });
  const ws6 = XLSX_LIB.utils.aoa_to_sheet([monthHeaders, ...monthRows]);
  ws6["!cols"] = [{wch:10},{wch:14},{wch:14},{wch:14},{wch:12},{wch:12}];
  for (let r=1;r<=monthRows.length;r++) {
    [1,2,3].forEach(c=>{ const cell=XLSX_LIB.utils.encode_cell({r,c}); if(ws6[cell]&&typeof ws6[cell].v==="number") ws6[cell].z=pFmt; });
  }
  XLSX_LIB.utils.book_append_sheet(wb, ws6, "月複利匯總");

  // Blob download
  const wbout = XLSX_LIB.write(wb, { bookType:"xlsx", type:"array" });
  const blob  = new Blob([wbout], { type:"application/octet-stream" });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement("a");
  a.href = url;
  a.download = `回測紀錄_${new Date().toISOString().slice(0,10)}.xlsx`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── UI Components ──

function BarSelector({ label, value, onChange, options }) {
  return (
    <div>
      <label className="text-zinc-500 text-xs mb-1 block">{label}</label>
      <div className="flex rounded-lg overflow-hidden border border-zinc-700">
        {options.map(b => (
          <button key={b} onClick={() => onChange(value === b ? "" : b)}
            className={`flex-1 py-1.5 text-xs font-mono font-bold transition-colors ${
              value === b ? "bg-amber-600 text-amber-100" : "bg-zinc-800 text-zinc-500 hover:bg-zinc-700"
            }`}>{b}</button>
        ))}
      </div>
    </div>
  );
}

function Tag({ children, color }) {
  const colors = {
    L: "bg-emerald-900 text-emerald-300 border border-emerald-700",
    S: "bg-rose-900 text-rose-300 border border-rose-700",
    "1": "bg-zinc-700 text-zinc-300",
    "2": "bg-sky-900 text-sky-300 border border-sky-700",
  };
  return (
    <span className={`inline-block px-1 py-0.5 rounded text-xs font-mono font-bold ${colors[children] || colors[color] || "bg-zinc-800 text-zinc-400"}`}>
      {children}
    </span>
  );
}

function RowInput({ row, idx, pctRate, onChange }) {
  const pnl = calcPnL(row.grids, pctRate, row.capital);
  return (
    <div className="rounded-xl border border-zinc-700 bg-zinc-900 p-3 mb-2">
      <div className="flex items-center gap-2 mb-2">
        <span className="text-amber-600 text-xs font-mono font-bold w-5 shrink-0 text-center">#{idx+1}</span>
        {/* Direction */}
        <div className="flex rounded-lg overflow-hidden border border-zinc-700 shrink-0">
          {["L","S"].map(d => (
            <button key={d} onClick={() => onChange({ ...row, direction: d })}
              className={`px-2.5 py-1.5 text-sm font-bold transition-colors ${
                row.direction === d
                  ? d==="L" ? "bg-emerald-700 text-emerald-100" : "bg-rose-700 text-rose-100"
                  : "bg-zinc-800 text-zinc-500"
              }`}>{d}</button>
          ))}
        </div>
        {/* Capital */}
        <div className="flex rounded-lg overflow-hidden border border-zinc-700 shrink-0">
          {CAPITAL_OPTIONS.map(o => (
            <button key={o.value} onClick={() => onChange({ ...row, capital: o.value })}
              className={`px-2.5 py-1.5 text-sm font-bold transition-colors ${
                row.capital === o.value
                  ? o.value===2 ? "bg-sky-700 text-sky-100" : "bg-zinc-600 text-zinc-100"
                  : "bg-zinc-800 text-zinc-500"
              }`}>×{o.label}</button>
          ))}
        </div>
        <div className="ml-auto">
          {pnl !== null
            ? <span className={`text-xs font-mono font-bold ${pnl >= 0 ? "text-emerald-400" : "text-rose-400"}`}>
                {pnl >= 0 ? "+" : ""}{pnl.toFixed(3)}%
              </span>
            : <span className="text-zinc-600 text-xs">—</span>
          }
        </div>
      </div>
      <div className="mb-2">
        <label className="text-zinc-500 text-xs mb-1 block">格數</label>
        <input type="number"
          className="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1.5 text-zinc-200 text-sm font-mono focus:outline-none focus:border-amber-500"
          placeholder="格數" value={row.grids}
          onChange={e => onChange({ ...row, grids: e.target.value })}
        />
      </div>
      <div>
        <label className="text-zinc-500 text-xs mb-1 block">進場K棒</label>
        <div className="flex rounded-lg overflow-hidden border border-zinc-700">
          {ENTRY_BAR_OPTIONS.map(b => (
            <button key={b} onClick={() => onChange({ ...row, entryBar: row.entryBar===b ? "" : b })}
              className={`flex-1 py-1.5 text-xs font-mono font-bold transition-colors ${
                row.entryBar===b ? "bg-amber-600 text-amber-100" : "bg-zinc-800 text-zinc-500 hover:bg-zinc-700"
              }`}>{b}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function DailyTotal({ rows, pctRate }) {
  const total = rows.reduce((acc, r) => acc + (calcPnL(r.grids, pctRate, r.capital) || 0), 0);
  return (
    <div className={`mb-3 rounded-xl px-4 py-2.5 border flex items-center justify-between ${
      total >= 0 ? "border-emerald-700 bg-emerald-900" : "border-rose-700 bg-rose-900"
    }`} style={{opacity:0.85}}>
      <span className="text-zinc-400 text-xs font-bold tracking-wider">當日總損益</span>
      <span className={`font-mono font-bold text-base ${total >= 0 ? "text-emerald-400" : "text-rose-400"}`}>
        {total >= 0 ? "+" : ""}{total.toFixed(3)}%
      </span>
    </div>
  );
}

function MonthlyCompoundPanel({ records, strategy }) {
  const filtered = records.filter(r => r.strategy === strategy);
  const monthSet = [...new Set(filtered.map(r => `${r.year}-${String(r.month).padStart(2,"0")}`))].sort().reverse().slice(0,4);
  if (!monthSet.length) return null;
  const color = strategy === 1 ? "amber" : "sky";
  return (
    <div className="mb-3">
      <div className={`text-xs font-bold tracking-wider mb-2 ${color==="amber"?"text-amber-400":"text-sky-400"}`}>
        策略{strategy} 每月複利損益
      </div>
      <div className="space-y-2">
        {monthSet.map(ym => {
          const [y,m] = ym.split("-").map(Number);
          const res = calcMonthlyCompound(filtered, y, m, strategy);
          if (!res) return null;
          const { steps, totalCompound } = res;
          const isPos = totalCompound >= 0;
          return (
            <div key={ym} className={`rounded-xl border px-3 py-2.5 ${isPos?"border-emerald-700 bg-emerald-900":"border-rose-700 bg-rose-900"}`} style={{opacity:0.8}}>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-zinc-400 text-xs font-mono font-bold">{y}/{String(m).padStart(2,"0")}</span>
                <span className={`font-mono font-bold text-sm ${isPos?"text-emerald-400":"text-rose-400"}`}>
                  {isPos?"+":""}{totalCompound.toFixed(3)}%
                </span>
              </div>
              <div className="flex gap-1 flex-wrap">
                {steps.map((s,i) => (
                  <div key={i} className="flex flex-col items-center" style={{minWidth:24}}>
                    <span className={`text-xs ${s.dayPnl>=0?"text-emerald-400":"text-rose-400"}`}>{s.dayPnl>=0?"▲":"▼"}</span>
                    <span className="text-zinc-600 text-xs font-mono">{s.day}</span>
                  </div>
                ))}
              </div>
              <div className="mt-1 flex items-center gap-1 flex-wrap">
                <span className="text-zinc-600 text-xs">累積：</span>
                {steps.map((s,i) => (
                  <span key={i} className={`text-xs font-mono ${s.compound>=0?"text-emerald-500":"text-rose-500"}`} style={{opacity:0.8}}>
                    {s.compound>=0?"+":""}{s.compound.toFixed(2)}%{i<steps.length-1?" →":""}
                  </span>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RecordCard({ record, onDelete }) {
  const [open, setOpen] = useState(false);
  const filled   = record.rows.filter(r => r.grids);
  const totalPnl = filled.reduce((acc, r) => acc + (calcPnL(r.grids, record.pctRate, r.capital) || 0), 0);
  const isS2     = record.strategy === 2;
  return (
    <div className={`rounded-xl border mb-2 overflow-hidden ${isS2 ? "border-sky-800 bg-sky-950" : "border-zinc-700 bg-zinc-900"}`}>
      <div className="flex items-center justify-between px-3 py-2.5 cursor-pointer" onClick={() => setOpen(o=>!o)}>
        <div className="flex items-center gap-2">
          <span className={`text-xs font-bold px-1.5 py-0.5 rounded font-mono ${isS2?"bg-sky-800 text-sky-200":"bg-zinc-700 text-zinc-300"}`}>S{record.strategy}</span>
          <span className="text-amber-400 font-mono font-bold text-sm">
            {record.year}/{String(record.month).padStart(2,"0")}/{String(record.day).padStart(2,"0")}
          </span>
          <span className="text-zinc-600 text-xs">{record.pctRate}% · {filled.length}筆</span>
        </div>
        <div className="flex items-center gap-2">
          <span className={`font-mono text-sm font-bold ${totalPnl>=0?"text-emerald-400":"text-rose-400"}`}>
            {totalPnl>=0?"+":""}{totalPnl.toFixed(3)}%
          </span>
          <span className="text-zinc-600 text-xs">{open?"▲":"▼"}</span>
        </div>
      </div>
      {open && (
        <div className="px-3 pb-3 border-t border-zinc-800">
          <div className="mt-2">
            <div className="grid text-zinc-600 text-xs font-mono mb-1 px-1" style={{gridTemplateColumns:"1.5rem 2rem 1.5rem 3rem 4rem 3rem"}}>
              <span>#</span><span>方向</span><span>×</span><span>格數</span><span>損益%</span><span>進場</span>
            </div>
            {filled.map((r,i) => {
              const pnl = calcPnL(r.grids, record.pctRate, r.capital);
              return (
                <div key={r.id} className="grid text-xs font-mono bg-zinc-800 rounded-lg px-2 py-1.5 items-center mb-1"
                  style={{gridTemplateColumns:"1.5rem 2rem 1.5rem 3rem 4rem 3rem"}}>
                  <span className="text-zinc-400">{i+1}</span>
                  <Tag>{r.direction}</Tag>
                  <span className={`font-bold ${r.capital===2?"text-sky-400":"text-zinc-400"}`}>×{r.capital}</span>
                  <span className="text-zinc-300">{r.grids||"—"}</span>
                  <span className={pnl!==null?(pnl>=0?"text-emerald-400":"text-rose-400"):"text-zinc-600"}>
                    {pnl!==null?`${pnl>=0?"+":""}${pnl.toFixed(3)}`:"—"}
                  </span>
                  <span className="text-amber-500">{r.entryBar||"—"}</span>
                </div>
              );
            })}
          </div>
          <button onClick={() => onDelete(record.id)} className="mt-2 text-xs text-rose-600 hover:text-rose-400 transition-colors">
            刪除此紀錄
          </button>
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App() {
  const [tab,       setTab]       = useState("entry");
  const [session,   setSession]   = useState(emptySession());
  const [records,   setRecords]   = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [saved,     setSaved]     = useState(false);
  const [exporting, setExporting] = useState(false);

  useEffect(() => { loadAll().then(r => { setRecords(r); setLoading(false); }); }, []);

  const updateRow = (idx, newRow) =>
    setSession(s => { const rows=[...s.rows]; rows[idx]=newRow; return {...s,rows}; });

  const handleSave = async () => {
    const newRecord = { id: Date.now(), ...session, savedAt: new Date().toISOString() };
    const updated   = [newRecord, ...records];
    setRecords(updated);
    await saveAll(updated);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
    setSession(emptySession());
  };

  const handleDelete = async id => {
    const updated = records.filter(r => r.id !== id);
    setRecords(updated);
    await saveAll(updated);
  };

  const handleExport = () => {
    setExporting(true);
    try { exportToExcel(records); } catch(e) { console.error(e); }
    setTimeout(() => setExporting(false), 1500);
  };

  // Stats per strategy
  const allT1 = records.filter(r=>r.strategy===1).flatMap(rec=>rec.rows.filter(r=>r.grids).map(r=>({pnl:calcPnL(r.grids,rec.pctRate,r.capital)})));
  const allT2 = records.filter(r=>r.strategy===2).flatMap(rec=>rec.rows.filter(r=>r.grids).map(r=>({pnl:calcPnL(r.grids,rec.pctRate,r.capital)})));
  const sumPnl = t => t.reduce((a,r)=>a+(r.pnl||0),0);
  const winRate = t => t.length ? ((t.filter(r=>(r.pnl||0)>0).length/t.length)*100).toFixed(1)+"%" : "—";

  const isS2 = session.strategy === 2;

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-100 pb-8" style={{fontFamily:"'IBM Plex Mono',monospace"}}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

      {/* Header */}
      <div className="sticky top-0 z-10 bg-zinc-950 border-b border-zinc-800 px-4 py-3" style={{backdropFilter:"blur(8px)",backgroundColor:"rgba(9,9,11,0.95)"}}>
        <div className="flex items-center justify-between">
          <div>
            <div className="text-amber-400 font-bold text-base tracking-widest">BACKTEST</div>
            <div className="text-zinc-600 text-xs">回測記錄系統</div>
          </div>
          <div className="flex gap-1">
            {["entry","records"].map(t => (
              <button key={t} onClick={()=>setTab(t)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${tab===t?"bg-amber-500 text-zinc-950":"bg-zinc-800 text-zinc-400"}`}>
                {t==="entry"?"輸入":`紀錄(${records.length})`}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── 輸入頁 ── */}
      {tab === "entry" && (
        <div className="px-4 py-4 max-w-lg mx-auto">

          {/* 年月日 */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            {[{label:"年",key:"year",opts:YEARS},{label:"月",key:"month",opts:MONTHS},{label:"日",key:"day",opts:DAYS}].map(f=>(
              <div key={f.key}>
                <label className="text-zinc-500 text-xs block mb-1">{f.label}</label>
                <select className={SC} value={session[f.key]}
                  onChange={e=>setSession(s=>({...s,[f.key]:parseInt(e.target.value)}))}>
                  {f.opts.map(v=><option key={v} value={v}>{v}</option>)}
                </select>
              </div>
            ))}
          </div>

          {/* 策略選擇（下拉）+ 每格% 同一行 */}
          <div className="grid grid-cols-2 gap-2 mb-3">
            <div>
              <label className="text-zinc-500 text-xs block mb-1">策略</label>
              <select
                className={`${SC} ${session.strategy===2?"text-sky-300":"text-amber-400"}`}
                value={session.strategy}
                onChange={e=>setSession(s=>({...s,strategy:parseInt(e.target.value)}))}>
                <option value={1}>策略一</option>
                <option value={2}>策略二</option>
              </select>
            </div>
            <div>
              <label className="text-zinc-500 text-xs block mb-1">每格百分比</label>
              <select
                className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-2 py-2 text-sky-300 text-sm font-mono font-bold text-center focus:outline-none focus:border-sky-500"
                value={session.pctRate}
                onChange={e=>setSession(s=>({...s,pctRate:parseFloat(e.target.value)}))}>
                {PERCENT_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
          </div>

          {/* 策略標示 */}
          <div className={`mb-3 px-3 py-1.5 rounded-lg border text-xs font-mono font-bold ${isS2?"border-sky-700 bg-sky-950 text-sky-300":"border-amber-700 bg-amber-950 text-amber-300"}`}>
            目前輸入：策略{session.strategy} · {session.pctRate}% / 格 · {session.year}/{String(session.month).padStart(2,"0")}/{String(session.day).padStart(2,"0")}
          </div>

          {/* 當日總損益 */}
          <DailyTotal rows={session.rows} pctRate={session.pctRate} />

          {/* 交易列 */}
          <div className="text-zinc-500 text-xs mb-2 flex justify-between items-center">
            <span>交易列表（{session.rows.length}/12）</span>
            {session.rows.length < 12 && (
              <button onClick={()=>setSession(s=>({...s,rows:[...s.rows,emptyRow()]}))}
                className="text-amber-500 text-xs">+ 新增列</button>
            )}
          </div>

          {session.rows.map((row,idx)=>(
            <RowInput key={row.id} row={row} idx={idx} pctRate={session.pctRate} onChange={nr=>updateRow(idx,nr)}/>
          ))}

          <button onClick={handleSave}
            className={`w-full mt-4 py-3 rounded-xl font-bold text-sm tracking-widest transition-all ${
              saved?"bg-emerald-600 text-white":isS2?"bg-sky-600 hover:bg-sky-500 text-white active:scale-95":"bg-amber-500 hover:bg-amber-400 text-zinc-950 active:scale-95"
            }`}>
            {saved ? "✓ 已儲存" : `儲存策略${session.strategy}紀錄`}
          </button>
        </div>
      )}

      {/* ── 紀錄頁 ── */}
      {tab === "records" && (
        <div className="px-4 py-4 max-w-lg mx-auto">
          {records.length > 0 && (
            <>
              {/* 統計卡片：策略一 */}
              <div className="mb-2">
                <div className="text-amber-400 text-xs font-bold tracking-wider mb-1">策略一</div>
                <div className="grid grid-cols-3 gap-2">
                  {[
                    {label:"總損益",val:`${sumPnl(allT1)>=0?"+":""}${sumPnl(allT1).toFixed(3)}%`,color:sumPnl(allT1)>=0?"text-emerald-400":"text-rose-400"},
                    {label:"總交易",val:`${allT1.length}筆`,color:"text-zinc-300"},
                    {label:"勝率",val:winRate(allT1),color:"text-amber-400"},
                  ].map(s=>(
                    <div key={s.label} className="bg-zinc-900 border border-zinc-800 rounded-xl p-2.5 text-center">
                      <div className="text-zinc-500 text-xs mb-1">{s.label}</div>
                      <div className={`font-mono font-bold text-sm ${s.color}`}>{s.val}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 統計卡片：策略二 */}
              {allT2.length > 0 && (
                <div className="mb-3">
                  <div className="text-sky-400 text-xs font-bold tracking-wider mb-1">策略二</div>
                  <div className="grid grid-cols-3 gap-2">
                    {[
                      {label:"總損益",val:`${sumPnl(allT2)>=0?"+":""}${sumPnl(allT2).toFixed(3)}%`,color:sumPnl(allT2)>=0?"text-emerald-400":"text-rose-400"},
                      {label:"總交易",val:`${allT2.length}筆`,color:"text-zinc-300"},
                      {label:"勝率",val:winRate(allT2),color:"text-sky-400"},
                    ].map(s=>(
                      <div key={s.label} className="bg-sky-950 border border-sky-900 rounded-xl p-2.5 text-center">
                        <div className="text-zinc-500 text-xs mb-1">{s.label}</div>
                        <div className={`font-mono font-bold text-sm ${s.color}`}>{s.val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Monthly compound */}
              <MonthlyCompoundPanel records={records} strategy={1} />
              {allT2.length > 0 && <MonthlyCompoundPanel records={records} strategy={2} />}

              {/* Export */}
              <button onClick={handleExport} disabled={exporting}
                className={`w-full mb-4 py-3 rounded-xl border font-bold text-sm tracking-wider transition-all active:scale-95 ${
                  exporting?"border-zinc-600 bg-zinc-800 text-zinc-500 cursor-wait"
                  :"border-emerald-700 bg-emerald-900 hover:bg-emerald-800 text-emerald-400"
                }`} style={{opacity:exporting?1:0.9}}>
                {exporting ? "⏳ 產生中…" : "⬇ Export Excel（策略一+二 · 差異比較）"}
              </button>
            </>
          )}

          {loading ? (
            <div className="text-zinc-600 text-center py-12 text-sm">載入中…</div>
          ) : records.length === 0 ? (
            <div className="text-zinc-700 text-center py-16 text-sm">
              <div className="text-3xl mb-3">📋</div><div>尚無回測紀錄</div>
            </div>
          ) : (
            <>
              {/* Group by date, show S1 then S2 */}
              {(() => {
                const allDates = [...new Set(records.map(r => dk(r)))].sort().reverse();
                return allDates.map(date => {
                  const dayRecs = records.filter(r => dk(r) === date).sort((a,b)=>a.strategy-b.strategy);
                  return (
                    <div key={date} className="mb-3">
                      <div className="text-zinc-600 text-xs font-mono mb-1 px-1">{date}</div>
                      {dayRecs.map(r => <RecordCard key={r.id} record={r} onDelete={handleDelete}/>)}
                    </div>
                  );
                });
              })()}
            </>
          )}
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

  </script>
</body>
</html>
